[build]
command = "npm run build:client"
functions = "netlify/functions"
publish = "dist/spa"


[functions]
node_bundler = "esbuild"
included_files = ["prisma/generated/client/**", "prisma/schema.prisma"]
[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
